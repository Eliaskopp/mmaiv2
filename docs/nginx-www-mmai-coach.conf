# nginx config for www.mmai.coach — MMAi V2 Production
# Deploy to: /etc/nginx/sites-available/www-mmai-coach
# Symlink:   ln -s /etc/nginx/sites-available/www-mmai-coach /etc/nginx/sites-enabled/
#
# NOTE: chat.mmai.coach stays as-is (staging). No redirect between the two.

server {
    listen 80;
    server_name www.mmai.coach mmai.coach;
    return 301 https://www.mmai.coach$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mmai.coach;

    ssl_certificate     /etc/letsencrypt/live/mmai.coach/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mmai.coach/privkey.pem;

    return 301 https://www.mmai.coach$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.mmai.coach;

    ssl_certificate     /etc/letsencrypt/live/mmai.coach/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mmai.coach/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Frontend — static files from Vite build
    root /home/mmai/mmai-v2/frontend/dist;
    index index.html;

    # API proxy → FastAPI on port 8001
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
